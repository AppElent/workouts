name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    env:
      WORKER_NAME: workouts-pr-${{ github.event.pull_request.number }}
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.PREVIEW_CLERK_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Convex provisions/refreshes preview backend pr-<N>, exposes its URL as
      # $CONVEX_URL inside --cmd, runs the build (we bridge CONVEX_URL ->
      # VITE_CONVEX_URL since the app reads VITE_CONVEX_URL at build time), then
      # runs the seed against the fresh backend.
      - name: Convex preview deploy + build + seed
        run: |
          npx convex deploy \
            --preview-create pr-${{ github.event.pull_request.number }} \
            --cmd 'VITE_CONVEX_URL=$CONVEX_URL VITE_CLERK_PUBLISHABLE_KEY=$VITE_CLERK_PUBLISHABLE_KEY npm run build' \
            --preview-run seedPreview:seedPreview

      - name: Deploy Worker (per-PR)
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          # Stream wrangler output live (so failures are visible in the log)
          # while also tee-ing to a file so we can grep the URL afterward.
          # --var overrides runtime bindings so the per-PR Worker runtime matches
          # the per-PR bundle (otherwise top-level wrangler.jsonc bakes the
          # production Clerk/Convex values onto the preview Worker).
          npx wrangler deploy \
            --name "$WORKER_NAME" \
            --var "VITE_CONVEX_URL:$CONVEX_URL" \
            --var "VITE_CLERK_PUBLISHABLE_KEY:$VITE_CLERK_PUBLISHABLE_KEY" \
            --var "environment_name:preview" \
            2>&1 | tee /tmp/wrangler-deploy.log
          URL=$(grep -oE 'https://[^ ]+workers\.dev' /tmp/wrangler-deploy.log | head -1)
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Upsert PR comment
        uses: actions/github-script@v7
        env:
          URL: ${{ steps.deploy.outputs.url }}
          PR: ${{ github.event.pull_request.number }}
        with:
          script: |
            const marker = '<!-- pr-preview-comment -->';
            const body = `${marker}\n### Preview\n- App: ${process.env.URL}\n- Convex preview: \`pr-${process.env.PR}\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Delete Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler delete --name "workouts-pr-${{ github.event.pull_request.number }}" || true
      # Convex preview deployments idle-expire automatically (~14 days).
      # No stable CLI delete command today; prune from the dashboard if needed.
